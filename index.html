<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쾌변 타이머</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="screen-login" class="screen">
            <h1 class="logo">쾌변 타이머</h1>
            <div class="auth-form">
                <div class="input-group"><label>아이디</label><input type="text" id="login-id" class="auth-input"></div>
                <div class="input-group"><label>비번</label><input type="password" id="login-pw" class="auth-input"></div>
                <div class="auth-btns" style="margin-top: 30px;">
                    <button onclick="handleLogin()" class="btn-3d btn-mint">로그인</button>
                    <button onclick="showScreen('screen-signup')" class="btn-text">회원가입 하러가기</button>
                </div>
            </div>
        </div>

        <div id="screen-signup" class="screen" style="display:none;">
            <h1 class="logo">회원가입</h1>
            <div class="auth-form">
                <div class="input-group"><label>아이디 <small>(영문/숫자 4~12자)</small></label><input type="text" id="signup-id" class="auth-input"></div>
                <div class="input-group"><label>비번</label><input type="password" id="signup-pw" class="auth-input"></div>
                <div class="input-group"><label>닉네임 <small>(한글 6자/영문 12자)</small></label><input type="text" id="signup-nick" class="auth-input"></div>
                <div class="auth-btns" style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="processSignup()" class="btn-3d btn-orange">가입 완료</button>
                    <button onclick="showScreen('screen-login')" class="btn-3d btn-grey">취소</button>
                </div>
            </div>
        </div>

        <div id="screen-main" class="screen" style="display:none;">
            <div class="main-header">
                <div class="header-left">
                    <span class="user-tag" onclick="toggleUserMenu()"><b id="user-display"></b>님 ▼</span>
                    <div id="user-menu" class="user-dropdown" style="display:none;">
                        <button onclick="changeNickname()">닉네임 변경</button>
                        <button onclick="resetLogs()">전체 기록 삭제</button>
                        <button onclick="withdrawAccount()" style="color:red;">회원 탈퇴</button>
                    </div>
                </div>
                <div class="header-right">
                    <button onclick="handleLogout()" class="btn-3d btn-grey small-text">로그아웃</button>
                </div>
            </div>

            <div class="main-content-area">
                <div class="cal-btn-wrapper">
                    <button onclick="showScreen('screen-calendar')" class="btn-3d btn-blue">📅 기록달력</button>
                </div>
                <div class="cat-box">
                    <img id="cat-img" src="sleeping.png" alt="고양이">
                </div>
                <div id="timer">00:00:00</div>
            </div>

            <div id="status-selector" class="status-selector" style="display:none;">
                <button onclick="selectType('설사')" id="type-설사" class="btn-type yellow">설사</button>
                <button onclick="selectType('변비')" id="type-변비" class="btn-type brown">변비</button>
                <button onclick="selectType('장염')" id="type-장염" class="btn-type purple">장염</button>
                <button onclick="selectType('혈변')" id="type-혈변" class="btn-type red">혈변</button>
            </div>
            <button id="btn-action" class="btn-3d btn-start" onclick="toggleTimer()">쾌변 시작!</button>
            <p id="status-msg">고양이가 자고 있어요.</p>
        </div>

        <div id="screen-calendar" class="screen" style="display:none;">
            <nav class="calendar-nav"><button onclick="showScreen('screen-main')" class="btn-3d btn-grey">⬅ 뒤로</button></nav>
            <div class="calendar-header">
                <button onclick="changeMonth(-1)" class="month-btn">◀</button>
                <h2 id="current-month-year"></h2>
                <button onclick="changeMonth(1)" class="month-btn">▶</button>
            </div>
            <div id="calendar-grid" class="grid-container"></div>
        </div>

        <div id="log-modal" class="modal" style="display:none;" onclick="closeModalExternally(event)">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h3 id="modal-date"></h3>
                <ul id="modal-timeline"></ul>
                <button id="btn-delete-selected" class="btn-3d btn-stop" style="width:100%; margin-top:15px; display:none;" onclick="deleteSelectedLogs()">선택한 기록 삭제</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
